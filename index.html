
<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback 360 | Professional Growth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Assistant"', 'sans-serif'],
            },
            colors: {
              slate: {
                50: '#f8fafc',
                100: '#f1f5f9',
                850: '#1e293b',
                900: '#0f172a',
              },
              accent: {
                50: '#f8fafc',
                100: '#f1f5f9',
                500: '#1e293b', // Deep Midnight
                600: '#0f172a',
                700: '#020617', // Rich Ink Blue
              }
            },
            boxShadow: {
              'premium': '0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05)',
              'soft': '0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.01)',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #F8FAFC;
        background-image: 
          linear-gradient(rgba(15, 23, 42, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(15, 23, 42, 0.03) 1px, transparent 1px);
        background-size: 40px 40px;
        color: #0F172A;
        font-family: 'Assistant', sans-serif;
        margin: 0;
        overflow-x: hidden;
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 2rem;
        padding: 3rem;
        box-shadow: 
          0 10px 15px -3px rgba(0, 0, 0, 0.02),
          0 4px 6px -4px rgba(0, 0, 0, 0.02),
          inset 0 2px 4px 0 rgba(255, 255, 255, 0.5);
      }
      .input-field {
        width: 100%;
        background-color: #FFFFFF;
        border: 1.5px solid #E2E8F0;
        border-radius: 1rem;
        padding: 1rem 1.5rem;
        color: #0F172A;
        font-weight: 500;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        outline: none;
      }
      .input-field:focus {
        border-color: #1e293b;
        background-color: #FFFFFF;
        box-shadow: 0 0 0 4px rgba(30, 41, 59, 0.05);
        transform: translateY(-1px);
      }
      /* Fix for animations */
      @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
      .animate-fade-in { animation: fade-in 0.5s ease-out; }
    </style>

    "docx": "https://jspm.dev/docx",

    "vite": "https://esm.sh/vite@^7.3.1",

}
</script>
